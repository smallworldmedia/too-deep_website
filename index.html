<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Too Deep — Jeff Sorkowitz</title>
  <meta name="description" content="Too Deep by Jeff Sorkowitz — Interactive artwork." />
  <link rel="preload" href="/fonts/Italiana-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/Aspekta-450.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face {
      font-family: 'Italiana';
      src: url('/fonts/Italiana-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Aspekta-450';
      src: url('/fonts/Aspekta-450.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <canvas id="canvas"></canvas>

  <!-- Share button — viewport top-right -->
  <button id="share-btn" aria-label="Share this page">
    <svg class="share-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" />
      <polyline points="16 6 12 2 8 6" />
      <line x1="12" y1="2" x2="12" y2="15" />
    </svg>
    <svg class="close-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
    <span class="share-label">Share</span>
  </button>

  <!-- Share toast -->
  <div id="share-toast" class="hidden">Copied</div>

  <!-- Dim + blur backdrop -->
  <div id="panel-backdrop"></div>

  <!-- Pre-save full-screen overlay -->
  <div id="presave-overlay">
    <div class="overlay-content">
      <p class="presave-prompt">Automatically add to your music library on Friday, May 1st.</p>
      <div class="platform-buttons" id="platform-buttons"></div>
    </div>
  </div>

  <!-- SWM credit — fixed bottom-left -->
  <a href="https://smallworld.media" target="_blank" rel="noopener noreferrer" class="swm-credit">
    <span class="swm-credit-prefix">site by</span>
    <img src="/logos/Small World Media Logo Inline Blue-01.svg" alt="Small World Media" class="swm-credit-logo" />
  </a>

  <!-- Bottom assembly — controls + presave + links panel -->
  <div id="bottom-assembly">
    <!-- Controls group — tape deck + presave + bass -->
    <div class="controls-group">
      <div class="controls-row">
        <!-- Unified Controls Panel -->
        <div class="controls-panel metal intro-hidden">
          <!-- Release date label — spans full panel width -->
          <div class="panel-release-label" id="release-label">RELEASING FRIDAY MAY 1, 2026</div>

          <!-- Horizontal divider -->
          <div class="panel-divider-horizontal"></div>

          <!-- Controls row -->
          <div class="controls-panel-row">
            <!-- Play + Pause -->
            <button class="tape-btn play" id="tape-play" aria-label="Play audio">
              <div class="tape-led"></div>
              <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg></span>
            </button>
            <button class="tape-btn pause pressed" id="tape-pause" aria-label="Pause audio">
              <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="6" y="4" width="4" height="16" />
                  <rect x="14" y="4" width="4" height="16" />
                </svg></span>
            </button>

            <!-- Divider -->
            <div class="panel-divider"></div>

            <!-- Pre-Save -->
            <button class="tape-btn presave" id="tape-presave" aria-expanded="false" aria-controls="panel-tier-2">
              <div class="presave-frosted-glass"></div>
              <span class="presave-content">
                <svg class="presave-heart" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
                <span class="presave-text">Presave</span>
              </span>
            </button>

            <!-- Divider -->
            <div class="panel-divider"></div>

            <!-- BASS Knob -->
            <div class="bass-section">
              <div class="sub-label glow-off" id="bass-label">BASS</div>
              <div class="knob-cluster" style="position: relative; width: 80px; height: 80px;">
                <div class="knob-led-ring-outer" id="bass-ring" style="position: absolute; inset: 0;"></div>
                <div class="sub-knob" id="bass-knob" data-rotation="360"
                  style="position: absolute; top: 12px; left: 12px; margin: 0; z-index: 2;">
                  <div class="sub-knob-floor-shadow"></div>
                  <div class="sub-knob-pivot pivot-3" style="position: absolute; inset: 0;"></div>
                  <div class="pivot-3-cap"></div>
                  <div class="sub-knob-pivot-notch" style="pointer-events: none;">
                    <div class="knob-embossed-notch glow-off"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>


  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
