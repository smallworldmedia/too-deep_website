<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Too Deep — Jeff Sorkowitz</title>
  <meta name="description"
    content="Too Deep by Jeff Sorkowitz — Interactive artwork for the new release on Short Circuit." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Aspekta-450';
      src: url('https://assets.unicorn.studio/fonts/custom/2XkgAIoiFOemW74z0NEtIhY9Jtl2/Aspekta-450/Aspekta-450.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <canvas id="canvas"></canvas>

  <!-- Release info — floating, top center -->
  <div id="release-info">
    <div class="release-available">Available</div>
    <div class="release-date">MAY 1, 2026</div>
    <div class="countdown-badge">
      <span class="countdown" id="countdown"></span>
    </div>
  </div>

  <!-- Share toast -->
  <div id="share-toast" class="hidden">Copied</div>

  <!-- Dim + blur backdrop -->
  <div id="panel-backdrop"></div>

  <!-- Bottom assembly — controls + presave + links panel -->
  <div id="bottom-assembly">
    <!-- Controls group — tape deck + presave + bass -->
    <div class="controls-group">
      <div class="controls-row">
        <!-- Tape Deck: Play + Pause -->
        <div class="tape-deck-panel metal">
          <button class="tape-btn play" id="tape-play" aria-label="Play audio">
            <div class="tape-led"></div>
            <span class="icon">▶</span>
          </button>
          <button class="tape-btn pause pressed" id="tape-pause" aria-label="Pause audio">
            <span class="icon">⏸</span>
          </button>
        </div>

        <!-- Pre-Save Button (Standalone Horizontal) -->
        <div class="presave-panel metal">
          <button class="tape-btn presave" id="tape-presave" aria-expanded="false" aria-controls="panel-tier-2">
            <span class="presave-content">
              <svg class="presave-heart" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
              </svg>
              <span class="presave-text">Presave</span>
            </span>
          </button>
        </div>

        <!-- BASS Sub Knob (Desktop) -->
        <div class="sub-control-wrapper metal v3-wrapper desktop-only">
          <div class="knob-cluster" style="position: relative; width: 94px; height: 94px;">
            <div class="knob-led-ring-outer" id="bass-ring" style="position: absolute; inset: 0;"></div>
            <div class="sub-knob" id="bass-knob" data-rotation="210"
              style="position: absolute; top: 12px; left: 12px; margin: 0; z-index: 2;">
              <div class="sub-knob-floor-shadow"></div>
              <div class="sub-knob-pivot pivot-3" style="position: absolute; inset: 0;"></div>
              <div class="pivot-3-cap"></div>
              <div class="sub-knob-pivot-notch" style="pointer-events: none;">
                <div class="knob-embossed-notch glow-off"></div>
              </div>
            </div>
          </div>
          <div class="sub-label glow-off" id="bass-label">BASS</div>
        </div>

        <!-- BASS Fader (Mobile) -->
        <div class="mobile-fader-wrapper metal mobile-only"
          style="display: flex; flex-direction: column; align-items: center; padding-top: 15px;">
          <div style="display: flex; gap: 12px; height: 180px; position: relative;">
            <div class="fader-led-container" id="fader-leds" style="position: relative; width: 12px; height: 100%;">
            </div>
            <div class="fader-track-container" id="fader-track" style="position: relative; width: 42px; height: 100%;">
              <div class="fader-slit"
                style="position: absolute; top: 12px; bottom: 12px; left: 50%; width: 10px; margin-left: -5px; background: #080808; border-radius: 5px; box-shadow: inset 0 2px 5px rgba(0,0,0,1), 0 1px 1px rgba(255,255,255,0.1);">
              </div>
              <div class="metal-fader" id="fader-handle"
                style="position: absolute; top: 156px; left: 0; width: 100%; height: 24px; cursor: ns-resize;">
                <div class="fader-embossed-notch glow-off"></div>
              </div>
            </div>
          </div>
          <div class="sub-label glow-off" id="fader-label" style="text-align: center; margin-top: 15px;">BASS</div>
        </div>
      </div>
    </div>

    <!-- Links panel -->
    <div id="bottom-panel">
      <button id="share-btn" aria-label="Share this page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" />
          <polyline points="16 6 12 2 8 6" />
          <line x1="12" y1="2" x2="12" y2="15" />
        </svg>
      </button>

      <div class="panel-tier2" id="panel-tier-2">
        <div class="tier2-inner">
          <div class="platform-buttons" id="platform-buttons"></div>
          <a href="https://smallworld.media" target="_blank" rel="noopener noreferrer" class="swm-credit">site by small
            world media</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
